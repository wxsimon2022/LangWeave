server {
    listen 80;
    server_name chat.mybfs.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.mybfs.cn;

    ssl_certificate /home/biu/chat/current/ssl/chat.mybfs.cn_bundle.pem;
    ssl_certificate_key /home/biu/chat/current/ssl/chat.mybfs.cn.key;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20m;

    location / {
        root /home/biu/chat/current/frontend;

        # 为搜索引擎爬虫返回宣传页（加速 SEO 收录）
        set $bot 0;
        if ($http_user_agent ~* "(Googlebot|Baiduspider|Bingbot|Slurp|YandexBot|Sogou|360Spider|facebookexternalhit|Twitterbot|rogerbot|LinkedInBot|AhrefsBot|SemrushBot)") {
            set $bot 1;
        }
        if ($uri ~ ^/$) {
            set $bot "${bot}1";
        }
        if ($bot = 11) {
            rewrite ^ /landing.html break;
        }

        try_files $uri $uri/ /index.html;
        index index.html;
    }

    location /landing {
        alias /home/biu/chat/current/frontend/landing.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
