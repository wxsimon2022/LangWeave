# LangWeave Nginx config for Docker deployment.
# Frontend static files are built into /usr/share/nginx/html/ (via Dockerfile production stage).
# API requests are proxied to the backend app container.

upstream app_backend {
    server app:8000;
}

server {
    listen 80;
    server_name localhost;

    # ── Frontend static files ──
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ── Assets caching ──
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy (SSE-friendly) ──
    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Auth API ──
    location /auth/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Upload size limit ──
    client_max_body_size 20m;
}
