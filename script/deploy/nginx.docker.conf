# LangWeave Nginx config for Docker deployment.
# The frontend static files are served by the FastAPI app itself
# (mounted at /app/frontend/ in the app container).
# This nginx proxies all /api/ requests to the app container.
#
# For production HTTPS, mount your SSL certs and adjust the server block,
# or put a TLS-terminating reverse proxy (e.g. Caddy, Traefik) in front.

upstream app_backend {
    server app:8000;
}

server {
    listen 80;
    server_name localhost;

    # ── Frontend static files (served by FastAPI app) ──
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API proxy (SSE-friendly) ──
    location /api/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Health check ──
    location /health {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets caching ──
    location /assets/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Upload size limit ──
    client_max_body_size 20m;
}
